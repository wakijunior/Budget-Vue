<!doctype html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <title>Login</title>
</head>

<body>
    <div>
        <nav class="navbar navbar-expand-lg bg-body-tertiary">
            <div class="container-fluid">
                <a class="navbar-brand" href="#">BUDGET APP</a>
                <button class="navbar-toggler" type="button" data-bs-toggle="collapse"
                    data-bs-target="#navbarNavAltMarkup" aria-controls="navbarNavAltMarkup" aria-expanded="false"
                    aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
                <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
                    <div class="navbar-nav">
                        <a class="nav-link active" aria-current="page" href="login.html">Login</a>
                        <a class="nav-link" href="register.html">Register</a>
                        <a class="nav-link" href="index.html">Budget</a>
                    </div>
                </div>
            </div>
        </nav>
    </div>

    <div class="container" id="app">
        <form id="form" name="form" @submit.prevent="loginUser">
            <div>
                <label for="username">Username</label>
                <input class="form-control form-control-sm" type="text" id="username" v-model="username"
                    placeholder="Enter your username" aria-label=".form-control-lg example" />
            </div>

            <div>
                <label for="password">Password</label>
                <input class="form-control" type="password" id="password" v-model="password" placeholder="Password"
                    aria-label="default input example" />
            </div>

            <button type="submit" class="btn btn-primary">
                <span v-if="!loader">Submit</span>
                <i v-if="loader" class="fa-solid fa-spinner fa-spin"></i>
            </button>

            <div class="alert alert-success" v-if="alertSuccessShow" role="alert">
                {{ alertMessage }}
            </div>
            <div class="alert alert-danger" v-if="alertErrorShow" role="alert">
                {{ alertMessage }}
            </div>
    </div>
    </form>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"
        integrity="sha512-Wx8niGbPNCD87mSuF0sBRytwW2+2ZFr7HwVDF8krCb3egstCc4oQfig+/cfg2OHd82KcUlOYxlSDAqdHqK5TCw=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

    <script>
        new Vue({
            el: "#app",
            data: {
                username: "",
                password: "",
                alertMessage: "",
                alertSuccessShow: false,
                alertErrorShow: false,
                token: "",
                loader: false,
            },

            methods: {
                loginUser() {

                    if (!this.username || !this.password) {
                        this.alertMessage = "Please fill in all fields.";
                        this.alertErrorShow = true;
                        return;
                    }

                    this.loader = true;

                    axios
                        .post("http://localhost:5000/login", {
                            username: this.username,
                            password: this.password,
                        })
                        .then((response) => {
                            this.loader = false;

                            const token = response.data.token;

                            localStorage.setItem("token", token);

                            this.alertMessage = "Login successful!";
                            this.alertSuccessShow = true;

                            // ✅ Redirect to budget page
                            window.location.href = "index.html";
                        })
                        .catch((error) => {
                            this.loader = false;

                            this.alertMessage =
                                error.response?.data?.error || "Login failed.";

                            this.alertErrorShow = true;
                        });
                },
            },
            mounted() {
                if (localStorage.getItem("token") != null) {
                    window.location.href = "index.html"
                }
            }
        });
    </script>
</body>

</html>
