<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
    integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
  <link href="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.3.7/datatables.min.css" rel="stylesheet"
    integrity="sha384-TaPZIHS40hwajVHHLxaVNexgxbNrJTIRl7BUl34LA1SFjtWIrsAJkw5e73Pb2wQ+" crossorigin="anonymous" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <title>Budget</title>
</head>

<body>
  <div id="app">
    <div>
      <nav class="navbar navbar-expand-lg bg-body-tertiary">
        <div class="container-fluid">
          <a class="navbar-brand" href="#">BUDGET APP</a>
          <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNavAltMarkup"
            aria-controls="navbarNavAltMarkup" aria-expanded="false" aria-label="Toggle navigation">
            <span class="navbar-toggler-icon"></span>
          </button>
          <div class="collapse navbar-collapse" id="navbarNavAltMarkup">
            <div class="navbar-nav">
              <a class="nav-link active" aria-current="page" href="login.html">Login</a>
              <a class="nav-link" href="register.html">Register</a>
              <a class="nav-link" href="index.html">Budget</a>
              <a class="nav-link" href="#" @click="logout">Logout</a>
            </div>
          </div>
        </div>
      </nav>
    </div>

    <div class="container">
      <h2 class="mt-4">Add Budget</h2>
      <form id="form" name="form" @submit.prevent="addBudget">
        <div class="mb-3">
          <input v-model="form.title" class="form-control" placeholder="Title" autocomplete="title" />
        </div>

        <div class="mb-3">
          <input v-model="form.amount" type="number" class="form-control" placeholder="Amount"
            autocomplete="current-amount" />
        </div>

        <div class="mb-3">
          <input v-model="form.date" type="date" class="form-control" />
        </div>
      </form>

      <button class="btn btn-primary" @click="addBudget">Add Budget</button>

      <h2 class="mt-4">My Budget List</h2>
      <table id="myTable" class="display">
        <thead>
          <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Amount</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody>
          <tr v-for="budget in budgets" :key="budget.id">
            <td>{{ budget.id }}</td>
            <td>{{ budget.title }}</td>
            <td>{{ budget.amount }}</td>
            <td>{{ budget.date }}</td>
          </tr>
        </tbody>
      </table>

      <div class="alert alert-success" v-if="alertSuccessShow" role="alert">
        {{ alertMessage }}
      </div>
      <div class="alert alert-danger" v-if="alertErrorShow" role="alert">
        {{ alertMessage }}
      </div>
    </div>
  </div>

  <script src="https://cdnjs.cloudflare.com/ajax/libs/vue/2.7.16/vue.min.js"
    integrity="sha512-Wx8niGbPNCD87mSuF0sBRytwW2+2ZFr7HwVDF8krCb3egstCc4oQfig+/cfg2OHd82KcUlOYxlSDAqdHqK5TCw=="
    crossorigin="anonymous" referrerpolicy="no-referrer"></script>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
    integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
    crossorigin="anonymous"></script>
  <script src="https://cdn.datatables.net/v/bs5/jq-3.7.0/dt-2.3.7/datatables.min.js"
    integrity="sha384-vt7Se62YlbFnFq+6GomzrzmNsmoyYSLuZlXUULIBkHoL6at7yZfsATRmsQ3MtuJP"
    crossorigin="anonymous"></script>
  <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>

  <script>
    new Vue({
      el: "#app",
      data: {
        budgets: [],
        form: {
          title: "",
          amount: "",
          date: "",
        },
        alertMessage: "",
        alertSuccessShow: false,
        alertErrorShow: false,
        loader: false,
        token: localStorage.getItem("token") || "",
        url: "http://127.0.0.1:5000",
      },
      methods: {
        // 🔹 Add budget
        addBudget() {
          if (!this.form.title || !this.form.amount || !this.form.date) {
            this.alertMessage = "All fields required";
            this.alertErrorShow = true;
            return;
          }

          axios
            .post(
              this.url + "/budget",
              {
                title: this.form.title,
                amount: this.form.amount,
                date: this.form.date,
              },
              {
                headers: {
                  Authorization: `Bearer ${this.token}`,
                },
              },
            )
            .then((response) => {
              this.alertMessage = "Budget added!";
              this.alertSuccessShow = true;
              this.form = { title: "", amount: "", date: "" };

              setTimeout(() => {
                location.reload();
                // this.alertSuccessShow = false;
              }, 2000);
            })
            .catch((error) => {
              this.alertMessage =
                error.response?.data?.error || "Error adding budget";
              this.alertErrorShow = true;
            });
        },

        // 🔹 Fetch budgets
        fetchBudgets() {
          axios
            .get(this.url + "/budget", {
              headers: { Authorization: `Bearer ${this.token}` },
            })
            .then((response) => {
              this.budgets = response.data;
              console.log("Fetched budgets:", this.budgets); // 👈 check this
              console.log("response data:", response.data); // 👈 check this

              this.$nextTick(() => {
                if ($.fn.DataTable.isDataTable("#myTable")) {
                  $("#myTable").DataTable().destroy();
                }
                $("#myTable").DataTable();
              });
            })
            .catch((err) => {
              this.alertMessage =
                err.response?.data?.error || "Failed to load budgets";
              this.alertErrorShow = true;
            });
        },
        logout() {
          localStorage.removeItem("token");
          window.location.href = "login.html";
        },
      },

      mounted() {
        if (localStorage.getItem("token") != null) {
          this.token = localStorage.getItem("token");
          this.fetchBudgets();
        } else {
          window.location.href = "register.html";
        }
      },
    });
  </script>
</body>

</html>
